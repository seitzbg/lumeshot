name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      # Capture tests self-skip via `.enabled(if: CGPreflightScreenCaptureAccess())`
      # — headless runners have no Screen Recording grant. (A future release job
      # that runs scripts/bundle.sh will sign ad-hoc, since the dev signing
      # keychain from scripts/setup-signing.sh only exists on the dev Mac.)
      - name: Test
        run: swift test
